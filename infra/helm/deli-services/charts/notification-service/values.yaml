replicaCount: 1
image:
  repository: deli/notification-service
  tag: local
  pullPolicy: Never
service:
  port: 8080
readinessProbe:
  initialDelaySeconds: 30
livenessProbe:
  initialDelaySeconds: 45
resources:
  requests:
    cpu: 100m
    memory: 192Mi
  limits:
    cpu: 400m
    memory: 384Mi
extraEnv:
  - name: SPRING_APPLICATION_NAME
    value: "notification-service"
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: platform-secrets
        key: JWT_SECRET
  - name: FCM_DRY_RUN
    value: "true"
initContainers:
  - name: wait-for-kafka
    image: busybox:1.36
    command: ['sh', '-c', 'until nc -z deli-platform-kafka 9092; do echo waiting; sleep 3; done']
