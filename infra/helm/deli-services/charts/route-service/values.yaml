replicaCount: 1
image:
  repository: deli/route-service
  tag: local
  pullPolicy: Never
service:
  port: 8080
readinessProbe:
  initialDelaySeconds: 30
livenessProbe:
  initialDelaySeconds: 45
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
extraEnv:
  - name: SPRING_APPLICATION_NAME
    value: "route-service"
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: platform-secrets
        key: JWT_SECRET
  - name: SPRING_DATASOURCE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: platform-secrets
        key: POSTGRES_PASSWORD
  - name: MAPS_API_KEY
    valueFrom:
      secretKeyRef:
        name: platform-secrets
        key: MAPS_API_KEY
initContainers:
  - name: wait-for-postgres
    image: busybox:1.36
    command: ['sh', '-c', 'until nc -z $(POSTGRES_HOST) $(POSTGRES_PORT); do echo waiting; sleep 3; done']
    envFrom:
      - configMapRef:
          name: platform-config
  - name: wait-for-kafka
    image: busybox:1.36
    command: ['sh', '-c', 'until nc -z deli-platform-kafka 9092; do echo waiting; sleep 3; done']
