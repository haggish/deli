apiVersion: v2
name: deli-services
description: >
  Umbrella Helm chart for all Deli microservices.
  Depends on deli-platform being installed first.
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: api-gateway
    version: "0.1.0"
    repository: "file://charts/api-gateway"

  - name: route-service
    version: "0.1.0"
    repository: "file://charts/route-service"

  - name: delivery-service
    version: "0.1.0"
    repository: "file://charts/delivery-service"

  - name: location-service
    version: "0.1.0"
    repository: "file://charts/location-service"

  - name: notification-service
    version: "0.1.0"
    repository: "file://charts/notification-service"
