# docker-compose.yml
#
# Starts ONLY the infrastructure dependencies — databases, Kafka, MinIO.
# Run your Spring Boot services from IntelliJ IDEA using the provided
# run configurations, or with: ./gradlew :services:<n>:bootRun
#
# Usage:
#   docker compose up -d          # start all infra
#   docker compose down -v        # stop and wipe volumes
#   docker compose logs -f kafka  # tail kafka logs
#
# Ports exposed on localhost (Windows host, accessible from WSL and IDEA):
#   Postgres    → 5432
#   TimescaleDB → 5433
#   Redis       → 6379
#   Kafka       → 9092 (internal) / 9094 (external, use from IDEA/WSL)
#   MinIO API   → 9000
#   MinIO UI    → 9001
#   Kafka UI    → 8090

name: deli-infra

services:

  # ── PostgreSQL (primary app database) ───────────────────────────────────────
  postgres:
    image: postgres:16.2-alpine
    container_name: deli-postgres
    environment:
      POSTGRES_DB: courierdb
      POSTGRES_USER: courier_user
      POSTGRES_PASSWORD: courier_pass_local
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courier_user -d courierdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── TimescaleDB (GPS time-series) ───────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:2.14.2-pg16
    container_name: deli-timescaledb
    environment:
      POSTGRES_DB: gpsdb
      POSTGRES_USER: gps_user
      POSTGRES_PASSWORD: gps_pass_local
    ports:
      - "5433:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gps_user -d gpsdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis (courier position cache) ──────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: deli-redis
    command: >
      redis-server
      --requirepass redis_local
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_local", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Kafka (KRaft mode — Apache official image, no ZooKeeper) ────────────────
  # Uses apache/kafka instead of bitnami/kafka — Bitnami removed old tags.
  # apache/kafka uses different env var names (no KAFKA_CFG_ prefix).
  kafka:
    image: apache/kafka:3.7.0
    container_name: deli-kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    ports:
      - "9092:9092"
      - "9094:9094"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:RELEASE.2024-03-21T23-13-43Z
    container_name: deli-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    container_name: deli-minio-init
    depends_on:
      - minio
    entrypoint: >
      sh -c "
        echo 'Waiting for MinIO...';
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          echo 'MinIO not ready, retrying in 3s...';
          sleep 3;
        done &&
        mc mb --ignore-existing local/delivery-proof-photos &&
        mc mb --ignore-existing local/delivery-signatures &&
        echo 'Buckets ready.'
      "
    restart: "no"

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: deli-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"

volumes:
  postgres-data:
  timescale-data:
  kafka-data:
  minio-data:

networks:
  default:
    name: deli-network
