version: 2
updates:
  # Gradle dependencies
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    groups:
      spring-boot:
        patterns: ["org.springframework*", "io.spring*"]
      kotlin:
        patterns: ["org.jetbrains.kotlin*", "org.jetbrains.kotlinx*"]

  # npm dependencies (mobile app)
  - package-ecosystem: npm
    directory: "/mobile-app"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    groups:
      angular:
        patterns: ["@angular*"]
      ionic:
        patterns: ["@ionic*", "@capacitor*"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
