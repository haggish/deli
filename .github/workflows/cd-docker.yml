name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "shared/**"
      - "buildSrc/**"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to build (leave empty for all)"
        required: false
        type: string

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: false   # Never cancel a running image push

env:
  JAVA_VERSION: "21"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/deli

jobs:
  # ── Build fat JARs ─────────────────────────────────────────────────────────
  build-jars:
    name: Build JARs
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build all bootJars
        run: |
          ./gradlew \
            :services:api-gateway:bootJar \
            :services:route-service:bootJar \
            :services:delivery-service:bootJar \
            :services:location-service:bootJar \
            :services:notification-service:bootJar \
            --no-configuration-cache

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: service-jars
          path: "services/*/build/libs/*-SNAPSHOT.jar"
          retention-days: 1

  # ── Build and push Docker images ────────────────────────────────────────────
  build-images:
    name: Docker — ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-jars

    strategy:
      matrix:
        service:
          - api-gateway
          - route-service
          - delivery-service
          - location-service
          - notification-service

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Download JARs
        uses: actions/download-artifact@v8
        with:
          name: service-jars
          path: services

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            JAR_FILE=build/libs/*.jar
