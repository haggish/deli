name: Backend CI

on:
  push:
    branches: ["**"]
    paths:
      - "services/**"
      - "shared/**"
      - "buildSrc/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build shared modules
        run: ./gradlew :shared:domain-model:build :shared:common-api:build --no-configuration-cache

      - name: Run shared module tests
        run: ./gradlew :shared:domain-model:test --no-configuration-cache

      - name: Build all services
        run: ./gradlew build --no-configuration-cache -x test

      - name: Run all tests
        run: ./gradlew test --no-configuration-cache

      - name: Upload test reports
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-reports
          path: "**/build/reports/tests/"
          retention-days: 7

  lint:
    name: Lint (ktlint)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Run ktlint
        run: ./gradlew ktlintCheck --no-configuration-cache

      - name: Upload ktlint reports
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: ktlint-reports
          path: "**/build/reports/ktlint/"
          retention-days: 7
