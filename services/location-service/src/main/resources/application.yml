spring:
  application:
    name: location-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://localhost:5433/gpsdb
    username: gps_user
    password: gps_pass_local
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: gps
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  flyway:
    url: jdbc:postgresql://localhost:5433/gpsdb
    user: gps_user
    password: gps_pass_local
    locations: classpath:db/migration
    schemas: gps
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      password: redis_local

  kafka:
    bootstrap-servers: localhost:9094
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: location-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

deli:
  location:
    courier-ttl-seconds: 60

logging:
  level:
    root: INFO
    com.deli: DEBUG

---
spring:
  config:
    activate:
      on-profile: kubernetes

  datasource:
    url: jdbc:postgresql://${TIMESCALE_HOST}:${TIMESCALE_PORT}/${TIMESCALE_DB}
    username: ${TIMESCALE_USER}
    password: ${TIMESCALE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: gps

  flyway:
    url: jdbc:postgresql://${TIMESCALE_HOST}:${TIMESCALE_PORT}/${TIMESCALE_DB}
    user: ${TIMESCALE_USER}
    password: ${TIMESCALE_PASSWORD}
    schemas: gps
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: location-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

deli:
  location:
    courier-ttl-seconds: 60
