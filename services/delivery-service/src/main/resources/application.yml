spring:
  application:
    name: delivery-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

logging:
  level:
    root: INFO
    com.deli: DEBUG

---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://localhost:5432/courierdb
    username: courier_user
    password: courier_pass_local
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false
    consumer:
      group-id: delivery-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.deli.shared.domain.events"

  servlet:
    multipart:
      enabled: true
      max-file-size: 15MB
      max-request-size: 20MB

deli:
  jwt:
    secret: "local-dev-secret-change-in-production-must-be-at-least-256-bits-long"
  s3:
    endpoint: http://localhost:9000    # MinIO local endpoint
    access-key: minioadmin
    secret-key: minioadmin
    region: us-east-1                  # MinIO ignores this but AWS SDK requires it
    bucket-photos: delivery-proof-photos
    bucket-signatures: delivery-signatures
    presigned-url-expiry-seconds: 300

logging:
  level:
    root: DEBUG
    org.hibernate.SQL: DEBUG
