spring:
  application:
    name: notification-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

logging:
  level:
    root: INFO
    com.deli: DEBUG

---
spring:
  config:
    activate:
      on-profile: local

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.deli.shared.domain.events"
        # Allow the consumer to process messages concurrently across topic partitions
        max.poll.records: 50
    listener:
      concurrency: 2
      ack-mode: manual              # Explicit ack — don't lose notifications on crash

deli:
  jwt:
    secret: "local-dev-secret-change-in-production-must-be-at-least-256-bits-long"
  fcm:
    # Local: set GOOGLE_APPLICATION_CREDENTIALS env var pointing to
    # a Firebase service account JSON, or leave blank to stub notifications.
    credentials-path: ${GOOGLE_APPLICATION_CREDENTIALS:}
    dry-run: ${FCM_DRY_RUN:true}   # true = log instead of actually sending in local dev

logging:
  level:
    root: DEBUG
    org.springframework.kafka: DEBUG
