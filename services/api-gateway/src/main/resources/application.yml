spring:
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

logging:
  level:
    root: INFO
    com.deli: DEBUG

---
spring:
  config:
    activate:
      on-profile: local

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/courierdb
    username: courier_user
    password: courier_pass_local
    pool:
      max-size: 10
      initial-size: 2

  flyway:
    url: jdbc:postgresql://localhost:5432/courierdb
    user: courier_user
    password: courier_pass_local
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: route-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/routes/**
            - id: delivery-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/deliveries/**
            - id: location-service-http
              uri: http://localhost:8083
              predicates:
                - Path=/api/locations/**
            - id: notification-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/notifications/**
            - id: location-service-ws
              uri: ws://localhost:8083
              predicates:
                - Path=/ws/**
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:4200"
                  - "http://localhost:8100"
                  - "capacitor://localhost"
                allowedMethods: ["GET","POST","PUT","PATCH","DELETE","OPTIONS"]
                allowedHeaders: ["*"]
                allowCredentials: true

deli:
  jwt:
    secret: "local-dev-secret-change-in-production-must-be-at-least-256-bits-long"
    expiry-minutes: 60
    refresh-expiry-days: 30

logging:
  level:
    root: DEBUG
    org.springframework.cloud.gateway: DEBUG

---
spring:
  config:
    activate:
      on-profile: kubernetes

  r2dbc:
    url: r2dbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    pool:
      max-size: 20
      initial-size: 5

  flyway:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    user: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: route-service
              uri: http://deli-route-service:8080
              predicates:
                - Path=/api/routes/**
            - id: delivery-service
              uri: http://deli-delivery-service:8080
              predicates:
                - Path=/api/deliveries/**
            - id: location-service-http
              uri: http://deli-location-service:8080
              predicates:
                - Path=/api/locations/**
            - id: notification-service
              uri: http://deli-notification-service:8080
              predicates:
                - Path=/api/notifications/**

deli:
  jwt:
    secret: ${JWT_SECRET}
    expiry-minutes: 60
    refresh-expiry-days: 30
